name: plantuml
services:
    plantuml:
        container_name: "planuml-server"
        ports:
            - 9003:8080
        image: plantuml/plantuml-server:jetty
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.plantuml.rule=Host(\"plantuml.localhost\")"
            - "traefik.http.routers.plantuml.entrypoints=web"
        networks:
            - traefik_default
networks:
  traefik_default :
    name: traefik_default
    external: true