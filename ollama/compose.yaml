services:
  ollama:
    volumes:
      - ollama:/root/.ollama
      - ./entry.sh:/entry.sh
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:latest
    environment:
      - OLLAMA_KEEP_ALIVE="24h"
    entrypoint: ["/bin/bash", "-c", "/entry.sh"]
    networks:
        - traefik_default

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - 3000:8080
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'WEBUI_SECRET_KEY='
      - 'WEBUI_AUTH=False'
    #extra_hosts:
    #  - host.docker.internal:host-gateway
    restart: unless-stopped
    labels:
                - "traefik.enable=true"
                - "traefik.http.routers.open-webui.rule=Host(\"ollama.localhost\")"
                - "traefik.http.routers.open-webui.entrypoints=web"
    networks:
        - traefik_default
    
networks:
  traefik_default :
    name: traefik_default
    external: true    

volumes:
  ollama: {}
  open-webui: {}